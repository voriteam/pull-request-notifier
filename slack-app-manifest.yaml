display_information:
  name: PR Notifier
  description: GitHub pull request notifications as Slack DMs
  background_color: "#24292f"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: PR Notifier
    always_online: true
  slash_commands:
    - command: /link-github
      url: https://YOUR_DOMAIN/slack/commands
      description: Link your GitHub account to receive PR notifications
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - im:write

settings:
  event_subscriptions:
    request_url: https://YOUR_DOMAIN/slack/events
    bot_events: []
  interactivity:
    is_enabled: true
    request_url: https://YOUR_DOMAIN/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
